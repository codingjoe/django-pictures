name: CI
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uvx --from build pyproject-build --sdist --wheel
      - run: uvx twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          path: dist/*
  pytest-os:
    name: PyTest
    strategy:
      matrix:
        os:
          - "ubuntu-latest"
          - "macos-latest"
          - "windows-latest"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run pytest -m "not benchmark"
      - uses: codecov/codecov-action@v6
        with:
          flags: ${{ matrix.os }}
          token: ${{ secrets.CODECOV_TOKEN }}
  pytest-python:
    name: PyTest
    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
        django-version:
          - "5.2" # LTS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv run --group=test --with Django~=${{ matrix.django-version }}.0 pytest -m "not benchmark"
      - uses: codecov/codecov-action@v6
        with:
          flags: py${{ matrix.python-version }}
          token: ${{ secrets.CODECOV_TOKEN }}
  pytest-django:
    name: PyTest
    strategy:
      matrix:
        python-version:
          - "3.12"
        django-version:
          # LTS gets tested on all OS
          - "6.0"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv run --group=test --with Django~=${{ matrix.django-version }}.0 pytest -m "not benchmark"
      - uses: codecov/codecov-action@v6
        with:
          flags: dj${{ matrix.django-version }}
          token: ${{ secrets.CODECOV_TOKEN }}
  pytest-extras:
    name: PyTest
    strategy:
      matrix:
        django-version:
          - "5.2" # LTS
        extras:
          - "celery"
          - "dramatiq"
          - "django-rq"
          - "drf"
          - "cleanup"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt update && sudo apt install -y redis-server
        if: matrix.extras == 'dramatiq' || matrix.extras == 'django-rq'
      - uses: astral-sh/setup-uv@v7
      - run: uv run --group=test --extra=${{ matrix.extras }} --with Django~=${{ matrix.django-version }}.0 pytest -m "not benchmark"
      - uses: codecov/codecov-action@v6
        with:
          flags: ${{ matrix.extras }}
          token: ${{ secrets.CODECOV_TOKEN }}
